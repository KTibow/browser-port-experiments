# ===========================================================================
# ACTION REQUIRED (repo owner / a token with `workflows` permission):
# Copy this file to `.github/workflows/deploy-pages.yaml`.
#
# Agents in this repo cannot create files under `.github/workflows/` (neither the
# relay PAT nor GITHUB_TOKEN may modify workflows), and the Pages site is set to
# `build_type: workflow`, so deployment cannot happen until this workflow exists.
# This mirrors the earlier convention in this repo ("copy over its workflow").
# ===========================================================================
name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Build site
        run: npm run build
      - name: Install Playwright (chromium)
        run: npx playwright install --with-deps chromium
      - name: Smoke test (landing + KolibriOS graphical boot)
        run: npx playwright test --grep @smoke
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
