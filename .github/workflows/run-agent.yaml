name: Run Agent

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: Prompt to run with Pi
        required: true
        type: string
      model:
        description: Model to run
        required: false
        type: string

# Permissions needed to push contents and create/modify workflows
permissions:
  contents: write # push new files or commits (publish contents)
  actions: write # trigger other workflow runs
  id-token: write # if needed for OIDC

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history for git operations

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install Pi
        run: npm install -g @earendil-works/pi-coding-agent

      - name: Patch Pi Anthropic cache retention
        run: |
          node <<'NODE'
          const { execFileSync } = require('node:child_process');
          const fs = require('node:fs');
          const path = require('node:path');

          const root = execFileSync('npm', ['root', '-g'], { encoding: 'utf8' }).trim();
          const candidates = [];
          const walk = (dir) => {
            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              const full = path.join(dir, entry.name);
              if (entry.isDirectory()) {
                walk(full);
              } else if (entry.isFile() && /providers[\\/]anthropic\.(js|ts)$/.test(full)) {
                candidates.push(full);
              }
            }
          };
          walk(root);

          let patched = false;
          for (const file of candidates) {
            const input = fs.readFileSync(file, 'utf8');
            const output = input.replace(
              /if \(getProviderEnvValue\("PI_CACHE_RETENTION", env\) === "long"\) \{\s*return "long";\s*\}\s*return "short";/g,
              'const envRetention = getProviderEnvValue("PI_CACHE_RETENTION", env);\n\tif (envRetention === "long" || envRetention === "none") {\n\t\treturn envRetention;\n\t}\n\treturn "short";',
            );
            if (output !== input) {
              fs.writeFileSync(file, output);
              console.log(`Patched ${file}`);
              patched = true;
            }
          }
          if (!patched) {
            throw new Error(`Could not patch Pi Anthropic cache retention under ${root}`);
          }
          NODE

      - name: Expose GitHub Actions runtime
        uses: crazy-max/ghaction-github-runtime@v3

      - name: Run Pi and push changes
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          PALANTIR_API_KEY: ${{ secrets.PALANTIR_API_KEY }}
          PI_CODING_AGENT_DIR: ${{ github.workspace }}/.pi
          PI_CACHE_RETENTION: none
          PI_SKIP_VERSION_CHECK: 1
          PI_TELEMETRY: 0
          MODEL: ${{ inputs.model }}
          PROMPT: ${{ inputs.prompt }}
        run: |
          # Prepare Pi arguments
          args=(--no-session)
          if [[ -n "$MODEL" ]]; then
            args+=(--model "$MODEL")
          fi

          pi "${args[@]}" -p "$PROMPT"
